groups:
  - id: registry.storage
    type: attribute_group
    display_name: Storage Attributes
    brief: >
      Attributes describing storage systems and their components.
    attributes:
      # Storage System Attributes
      - id: storage.system.vendor
        type: string
        stability: development
        brief: >
          Indicates the vendor name of the storage system.
        examples: ['IBM']
      - id: storage.system.model
        type: string
        stability: development
        brief: >
          Indicates the model number of the storage system.
        examples: ['6H2']
      - id: storage.system.type
        type: string
        stability: development
        brief: >
          Indicates the machine type of the storage system.
        examples: ['FlashSystem 7200 - 2076']
      - id: storage.system.serial_number
        type: string
        stability: development
        brief: >
          Indicates the serial number of the storage system.
        examples: ['75YZ471']
      - id: storage.system.timezone
        type: string
        stability: development
        brief: >
          Indicates the time zone set on the storage system.
        examples: ['Asia/Hong_Kong']
      - id: storage.system.version
        type: string
        stability: development
        brief: >
          Firmware version of the storage system.
        examples: ['9.1.0.1 (build 187.27.2508061154000)']
      - id: storage.system.name
        type: string
        stability: development
        brief: >
          Indicates the name of the storage system.
        examples: ['FS9100-5']
      - id: storage.system.status
        type: string
        stability: development
        brief: >
          Indicates the status of the storage system.
        examples: ['Normal',' Error',' Unreachable']
      - id: storage.system.protocol
        type: string[]
        stability: development
        brief: >
          Indicates the supported protocols by the storage system.
        examples: [['Block', 'File', 'Object']]
      - id: storage.system.location
        type: string
        stability: development
        brief: >
          The geographical location or building where the storage system is located.
        examples: ['Bangalore-DC1']
      - id: storage.system.ip_address
        type: string
        stability: development
        brief: >
          Indicates the Internet Protocol Version 4 (IPv4) address of the storage system.
        note: >
          IPv4 addresses MUST be specified in dotted-quad notation.
        examples: ['192.168.1.100', '10.0.0.50']
      - id: storage.system.ip_address_6
        type: string
        stability: development
        brief: >
          Indicates the Internet Protocol Version 6 (IPv6) address of the storage system.
        note: >
          IPv6 addresses MUST be specified in the RFC 5952 format.
        examples: ['fe80::abc2:4a28:737a:609e', '2001:db8::1']
      - id: storage.system.url
        type: string
        stability: development
        brief: >
          Uniform Resource Locator providing the web address for the storage system management interface.
        examples: ['https://ibm-flashsystem.example.com', 'https://192.168.1.100:8443', 'https://ess-mgmt.datacenter.com']
      - id: storage.system.compressed
        type: boolean
        stability: development
        brief: >
          Indicates if compression is enabled at the storage system level.
        examples: [true, false]

      # Storage Cluster Attributes
      - id: storage.cluster.name
        type: string
        stability: development
        brief: >
          Indicates the name of the storage cluster.
        examples: ['gpfs-cluster.example.com', 'scale-prod-cluster', 'ess-cluster-dc1']
      - id: storage.cluster.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the storage cluster.
        examples: ['000002042000B966']
      - id: storage.cluster.domain
        type: string
        stability: development
        brief: >
          Indicates the configured domain of the storage cluster.
        examples: ['gpfs-cluster.example.com', 'scale.datacenter.ibm.com', 'ess.storage.local']

      # Storage Node Attributes
      - id: storage.node.name
        type: string
        stability: development
        brief: >
          The configured name of the node/controller of the storage system.
        examples: ['node1.gpfs.example.com', 'ess-node-01', 'flashsystem-ctrl-a']
      - id: storage.node.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the node in the cluster.
        examples: ['1', '2', 'node-0A1B2C3D']
      - id: storage.node.status
        type: string
        stability: development
        brief: >
          Indicates the status of the node.
        examples: ['online', 'offline', 'degraded']
      - id: storage.node.ip_address
        type: string
        stability: development
        brief: >
          Indicates the Internet Protocol Version 4 (IPv4) address of the node.
        note: >
          IPv4 addresses MUST be specified in dotted-quad notation.
        examples: ['192.168.1.1', '10.0.0.10']
      - id: storage.node.ip_address_6
        type: string
        stability: development
        brief: >
          Indicates the Internet Protocol Version 6 (IPv6) address of the node.
        note: >
          IPv6 addresses MUST be specified in the RFC 5952 format.
        examples: ['fe80::1', '2001:db8::2']
      - id: storage.node.version
        type: string
        stability: development
        brief: >
          Firmware version of the specific node.
        examples: ['6.0.0.0 250903.110001']
      - id: storage.node.partner
        type: string
        stability: development
        brief: >
          Indicates the partner node identifier for high availability configurations.
        examples: ['node2', 'canister2', 'partner-node-02']
      - id: storage.node.protocols
        type: string[]
        stability: development
        brief: >
          Indicates the protocols supported by the node.
        examples: [['NFS', 'SMB', 'Object']]
      - id: storage.node.cluster
        type: string
        stability: development
        brief: >
          Indicates the cluster name to which the node belongs.
        examples: ['gpfs-prod-cluster', 'scale-cluster-dc1', 'ess-cluster']

      # Storage Pool Attributes
      - id: storage.pool.id
        type: string
        stability: development
        brief: >
          Indicates the pool number of specific pool in the cluster.
        examples: ['0', '1']
      - id: storage.pool.name
        type: string
        stability: development
        brief: >
          The name of the storage pool within the storage system.
        examples: ['system', 'data', 'ssd_pool', 'capacity_pool']
      - id: storage.pool.status
        type: string
        stability: development
        brief: >
          Indicates the status of the storage pool.
        examples: ['online', 'offline', 'degraded']
      - id: storage.pool.type
        type: string
        stability: development
        brief: >
          Indicates the type of pool or the data type supported by the pool.
        examples: ['compressed','standard','dataOnly', 'metadataOnly', 'dataAndMetadata']

      # Storage Array Attributes
      - id: storage.array.id
        type: string
        stability: development
        brief: >
          Indicates the array number of the specific array in the cluster.
        examples: ['p30da_d', '1']
      - id: storage.array.name
        type: string
        stability: development
        brief: >
          Indicates the name of the storage array.
        examples: ['array1', 'array_ssd_01', 'capacity_array_A']
      - id: storage.array.status
        type: string
        stability: development
        brief: >
          Indicates the status of the storage array.
        examples: ['online', 'offline', 'degraded']
      - id: storage.array.raid_level
        type: string
        stability: development
        brief: >
          Indicates the RAID level of the array.
        examples: ['raid0', 'raid1', 'raid5', 'raid6', 'raid10']
      - id: storage.array.compressed
        type: boolean
        stability: development
        brief: >
          Specifies whether the array is compressed.
        examples: [true, false]
      - id: storage.array.encryption
        type: boolean
        stability: development
        brief: >
          Specifies whether the array is encrypted.
        examples: [true, false]

      # Storage Disk/Drive Attributes
      - id: storage.disk.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the disk drive.
        examples: ['0', '1']
      - id: storage.disk.name
        type: string
        stability: development
        brief: >
          The name of the disk drive within the storage system.
        examples: ['hdisk0', 'da0', 'e2s23', 'disk_0_1']
      - id: storage.disk.rpm
        type: string
        stability: development
        brief: >
          Indicates the specified RPM (revolutions per minute) of the disk.
        examples: ['10000', '7200', '15000']
      - id: storage.disk.vendor
        type: string
        stability: development
        brief: >
          Indicates the manufacturer name of the disk.
        examples: ['IBM', 'Seagate', 'Western Digital', 'Samsung']
      - id: storage.disk.model
        type: string
        stability: development
        brief: >
          Indicates the model or product ID of the disk.
        examples: ['IBM-ESXS ST9300605SS B559 6XP5GQMP0000M338BUSD']
      - id: storage.disk.serial_number
        type: string
        stability: development
        brief: >
          Indicates the serial number of the disk.
        examples: ['SX31700361-23']
      - id: storage.disk.location
        type: string
        stability: development
        brief: >
          Indicates the physical location such as enclosure and slot number of the disk.
        examples: ['enclosure:1:slot:3', 'drawer:2:slot:12']
      - id: storage.disk.status
        type: string
        stability: development
        brief: >
          Indicates the status of the disk drive.
        examples: ['online', 'offline', 'failed']
      - id: storage.disk.compressed
        type: boolean
        stability: development
        brief: >
          Specifies whether the disk is compressed.
        examples: [true, false]
      - id: storage.disk.encryption
        type: boolean
        stability: development
        brief: >
          Specifies whether the disk is encrypted.
        examples: [true, false]

      # Storage Enclosure Attributes
      - id: storage.enclosure.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the storage enclosure.
        examples: ['1', '2']
      - id: storage.enclosure.name
        type: string
        stability: development
        brief: >
          The name of the storage enclosure within the storage system.
        examples: ['1818-80E-SV12345001', '2076-524-SN78A0W0A', 'EXP24S-SN123456']
      - id: storage.enclosure.status
        type: string
        stability: development
        brief: >
          Indicates the status of the storage enclosure.
        examples: ['online', 'offline', 'degraded']
      - id: storage.enclosure.serialnumber
        type: string
        stability: development
        brief: >
          Indicates the serial number of the enclosure.
        examples: ['SV12345001', '78A0W0A', 'YL10WT123']
      - id: storage.enclosure.version
        type: string
        stability: development
        brief: >
          Indicates the firmware version of the enclosure.
        examples: ['01.50.00.00', '02.10.05.00', '1.2.3.4']
      - id: storage.enclosure.type
        type: string
        stability: development
        brief: >
          Indicates the type of enclosure.
        examples: ['Control', 'Expansion', 'JBOD']
      - id: storage.enclosure.partnumber
        type: string
        stability: development
        brief: >
          Indicates the FRU part number of the enclosure.
        examples: ['1818-80E', '2076-524']

      # Storage Volume Attributes
      - id: storage.volume.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the volume.
        examples: ['0', '1']
      - id: storage.volume.name
        type: string
        stability: development
        brief: >
          Indicates the name of the volume.
        examples: ['vol_prod_01', 'data_volume', 'backup_lun']
      - id: storage.volume.type
        type: string
        stability: development
        brief: >
          Indicates the type of the volume.
        examples: ['striped', 'seq', 'image', 'thin', 'thick']
      - id: storage.volume.status
        type: string
        stability: development
        brief: >
          Indicates the status of the volume.
        examples: ['online', 'offline', 'degraded', 'deleting']
      - id: storage.volume.snapshot_count
        type: int
        stability: development
        brief: >
          Indicates the count of point-in-time copies for the specific volume.
        examples: [5]
      - id: storage.volume.compressed
        type: boolean
        stability: development
        brief: >
          Specifies whether the volume is compressed.
        examples: [true, false]
      - id: storage.volume.encryption
        type: boolean
        stability: development
        brief: >
          Specifies whether the volume is encrypted.
        examples: [true, false]

      # Storage Snapshot Attributes
      - id: storage.snapshot.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the snapshot.
        examples: ['24']
      - id: storage.snapshot.name
        type: string
        stability: development
        brief: >
          Indicates the name of the snapshot.
        examples: ['Prod_snap1', 'backup-2024-01-15']
      - id: storage.snapshot.state
        type: string
        stability: development
        brief: >
          Indicates the state of the snapshot.
        examples: ['active', 'inactive']
      - id: storage.snapshot.creation_time
        type: string
        stability: development
        brief: >
          Indicates the creation time of the snapshot in ISO 8601 format.
        examples: ['2024-01-15T10:30:00Z', '2024-03-20T14:45:30Z']
      - id: storage.snapshot.expire_time
        type: string
        stability: development
        brief: >
          Indicates the expiration time of the snapshot in ISO 8601 format.
        examples: ['2024-02-15T10:30:00Z', '2024-04-20T14:45:30Z']

      # Storage Volume Group Attributes
      - id: storage.volumegroup.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the volume group.
        examples: ['22']
      - id: storage.volumegroup.name
        type: string
        stability: development
        brief: >
          Indicates the name of the volume group.
        examples: ['Prod1', 'app-volume-group']
      - id: storage.volumegroup.status
        type: string
        stability: development
        brief: >
          Indicates the status of the volume group.
        examples: ['online', 'offline', 'degraded']

      # Storage Filesystem Attributes
      - id: storage.filesystem.name
        type: string
        stability: development
        brief: >
          The name of the filesystem within the storage system.
        examples: ['fs0','prod-fs']
      - id: storage.filesystem.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the filesystem.
        examples: ['0', '1']
      - id: storage.filesystem.type
        type: string
        stability: development
        brief: >
          Indicates the filesystem type.
        examples: ['GPFS', 'ext4', 'NTFS']
      - id: storage.filesystem.path
        type: string
        stability: development
        brief: >
          Indicates the mount path of the filesystem.
        examples: ['/gpfs/fs0', '/mnt/data']
      - id: storage.filesystem.status
        type: string
        stability: development
        brief: >
          Indicates the status of the filesystem.
        examples: ['online', 'offline', 'mounted', 'unmounted']
        
      # Storage IP Port Attributes
      - id: storage.ip_port.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the IP port.
        examples: ['0', '1']
      - id: storage.ip_port.name
        type: string
        stability: development
        brief: >
          The logical name of the IP port within the storage system.
        examples: ['node1', 'Port 1', 'eth0']
      - id: storage.ip_port.role
        type: string
        stability: development
        brief: >
          Indicates the role assigned to the specific port.
        examples: ['Host Attach', 'Storage Attach', 'Management']
      - id: storage.ip_port.status
        type: string
        stability: development
        brief: >
          Indicates the status of the specific port.
        examples: ['active', 'inactive', 'down']
      - id: storage.ip_port.mac_address
        type: string
        stability: development
        brief: >
          Specifies the MAC address of the IP port.
        examples: ['00:1a:2b:3c:4d:5e', 'aa:bb:cc:dd:ee:ff']
      - id: storage.ip_port.ip_address
        type: string
        stability: development
        brief: >
          Indicates the Internet Protocol Version 4 (IPv4) address of the port.
        note: >
          IPv4 addresses MUST be specified in dotted-quad notation.
        examples: ['192.168.1.10', '10.0.0.20']
      - id: storage.ip_port.ip_address_6
        type: string
        stability: development
        brief: >
          Indicates the Internet Protocol Version 6 (IPv6) address of the port.
        note: >
          IPv6 addresses MUST be specified in the RFC 5952 format.
        examples: ['fe80::1', '2001:db8::3']
      - id: storage.ip_port.subnet
        type: string
        stability: development
        brief: >
          Indicates the IP subnet of the port.
        examples: ['192.168.1.0/24']
      - id: storage.ip_port.gateway
        type: string
        stability: development
        brief: >
          Indicates the IP gateway for the port.
        examples: ['192.168.1.1']
      - id: storage.ip_port.iqn
        type: string
        stability: development
        brief: >
          Indicates the iSCSI qualified name of the port.
        examples: ['iqn.1986-03.com.ibm:2145.h1ibmzzzfs5ksyb6607.node1']

      # Storage FC Port Attributes
      - id: storage.fc_port.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the Fibre Channel port.
        examples: ['0', '1']
      - id: storage.fc_port.name
        type: string
        stability: development
        brief: >
          The logical name of the Fibre Channel port within the storage system.
        examples: ['node1', 'FC PORT 1', 'fc0']
      - id: storage.fc_port.status
        type: string
        stability: development
        brief: >
          Indicates the status of the specific Fibre Channel port.
        examples: ['operational', 'offline', 'error']
      - id: storage.fc_port.wwpn
        type: string
        stability: development
        brief: >
          Indicates the unique worldwide port name (WWPN) of the Fibre Channel port.
        examples: ['50:05:07:68:01:23:45:67', '21:00:00:24:FF:12:34:56']

      # Storage Host Attributes
      - id: storage.host.id
        type: string
        stability: development
        brief: >
          Indicates the unique host identifier within the storage system.
        examples: ['0', '1']
      - id: storage.host.name
        type: string
        stability: development
        brief: >
          Indicates the unique host name within the storage system.
        examples: ['app-server-01', 'db-host-prod']
      - id: storage.host.status
        type: string
        stability: development
        brief: >
          Indicates whether the configured host is online or offline.
        examples: ['online', 'offline']
      - id: storage.host.type
        type: string
        stability: development
        brief: >
          Indicates the host type.
        examples: ['ESXi','other']
      - id: storage.host.fc_port.id
        type: string
        stability: development
        brief: >
          Highlights the identifier of the Fibre Channel port belonging to the host.
        examples: ['0', '1']
      - id: storage.host.fc_port.wwpn
        type: string
        stability: development
        brief: >
          Indicates the worldwide port name (WWPN) of the host's Fibre Channel port.
        examples: ['10:00:00:00:C9:12:34:56', '20:00:00:25:B5:AB:CD:EF']

      # Tape Library Attributes
      - id: storage.tapelibrary.vendor
        type: string
        stability: development
        brief: >
          Indicates the vendor name of the tape library.
        examples: ['IBM', 'Quantum', 'Oracle']
      - id: storage.tapelibrary.model
        type: string
        stability: development
        brief: >
          Indicates the model number of the tape library.
        examples: ['TS4500', 'Scalar i6', 'StorageTek SL8500']
      - id: storage.tapelibrary.serial_number
        type: string
        stability: development
        brief: >
          Indicates the serial number of the tape library.
        examples: ['78A2345XYZ', 'TL-SN-123456']
      - id: storage.tapelibrary.version
        type: string
        stability: development
        brief: >
          Indicates the firmware version of the tape library.
        examples: ['3.7.0', '8.2.1']
      - id: storage.tapelibrary.location
        type: string
        stability: development
        brief: >
          The geographical location or building where the tape library is located.
        examples: ['Bangalore-DC1', 'Tape-Vault-A']
      - id: storage.tapelibrary.logical_name
        type: string
        stability: development
        brief: >
          Indicates the logical name given to the tape library.
        examples: ['LIB001', 'backup-library-prod']

      # Tape Drive Attributes
      - id: storage.tapedrive.id
        type: string
        stability: development
        brief: >
          Indicates the unique identifier of the tape drive.
        examples: ['DRIVE03', 'drive-uuid-abc']
      - id: storage.tapedrive.vendor
        type: string
        stability: development
        brief: >
          Indicates the vendor name of the tape drive.
        examples: ['IBM', 'HP', 'Quantum']
      - id: storage.tapedrive.model
        type: string
        stability: development
        brief: >
          Indicates the model of the tape drive.
        examples: ['LTO-9', 'LTO-8', 'T10000D']
      - id: storage.tapedrive.version
        type: string
        stability: development
        brief: >
          Indicates the firmware version of the tape drive.
        examples: ['J9F2', 'A.01', '1.2.3']
      - id: storage.tapedrive.status
        type: string
        stability: development
        brief: >
          Indicates the health status of the tape drive.
        examples: ['healthy', 'warning', 'critical', 'failed']

