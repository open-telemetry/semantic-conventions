groups:
  - id: event.http.client.request.exception
    name: http.client.request.exception
    stability: development
    type: event
    brief: >
      This event represents an exception that occurred during an HTTP client request,
      such as network failures, timeouts, or other errors that prevent the request
      from completing successfully.
    note: >
      This event SHOULD be recorded when an exception occurs during HTTP client operations.

      Instrumentations SHOULD set the severity to WARN (severity number 13) when recording this event.

      Some HTTP client frameworks generate artificial exceptions for non-successful HTTP status codes
      (e.g., 404 Not Found). When possible, instrumentations SHOULD NOT record these artificial
      exceptions, or SHOULD set the severity to DEBUG (severity number 5).

      Instrumentations MAY provide a configuration option to populate exception events
      with the attributes captured on the corresponding HTTP client span.
    attributes:
      - ref: exception.type
        requirement_level:
          conditionally_required: Required if `exception.message` is not set, recommended otherwise.
      - ref: exception.message
        requirement_level:
          conditionally_required: Required if `exception.type` is not set, recommended otherwise.
      - ref: exception.stacktrace

  - id: event.http.client.network_timing
    name: http.client.network_timing
    stability: development
    type: event
    brief: >
      This event captures per-phase timing for an HTTP client request.
    note: |
      This event MAY be emitted when instrumentation has access to network phase timings for an HTTP client call.

      **Timestamp:** MUST be the absolute time when the HTTP client call started, in milliseconds since the Unix epoch.

      **Timing attributes:** All timing attributes on this event (including `http.call.end_time`) MUST be interpreted as non-negative deltas in milliseconds from `Timestamp` (elapsed time from call start to each recorded phase boundary).

      **ObservedTimestamp:** SHOULD be set to the time the event was emitted when it differs materially from `Timestamp`.

      **Trace context:** When an OpenTelemetry trace is available for the operation, the event MUST use the Context of the corresponding HTTP client span so backends can correlate the event with the span. When no such span exists, the event MAY omit span correlation.

      **Attribute emission:** Instrumentations SHOULD emit only timing attributes that the platform provides and SHOULD omit attributes that are unknown or not applicable.

      **Span attribute copy:** Instrumentations MAY expose a configuration boolean to copy a curated list of attributes from the corresponding HTTP client span onto this event. Copied attributes MUST use the same semantics as on the [HTTP client span](/docs/http/http-spans.md); attribute definitions are in the attribute registry (see [HTTP client span](/docs/http/http-spans.md) and linked registry pages). On this event, copied attributes are `Opt-In` when the option is enabled (requirement levels may differ from the span). Those attributes support metrics filtering and aggregation on backends that cannot yet correlate by context alone. When the option is disabled, those attributes SHOULD be omitted. When it is enabled, instrumentations SHOULD populate them.
    attributes:
      - ref: http.dns.start_time
        requirement_level: opt_in
      - ref: http.dns.end_time
        requirement_level: opt_in
      - ref: http.connect.start_time
        requirement_level: opt_in
      - ref: http.connect.end_time
        requirement_level: opt_in
      - ref: http.secure_connect.start_time
        requirement_level: opt_in
      - ref: http.secure_connect.end_time
        requirement_level: opt_in
      - ref: http.request.headers.start_time
        requirement_level: opt_in
      - ref: http.request.headers.end_time
        requirement_level: opt_in
      - ref: http.request.body.start_time
        requirement_level: opt_in
      - ref: http.request.body.end_time
        requirement_level: opt_in
      - ref: http.response.headers.start_time
        requirement_level: opt_in
      - ref: http.response.headers.end_time
        requirement_level: opt_in
      - ref: http.response.body.start_time
        requirement_level: opt_in
      - ref: http.response.body.end_time
        requirement_level: opt_in
      - ref: http.call.end_time
        requirement_level: required
      # Opt-in: copy from corresponding HTTP client span when span-attribute copy is enabled (see note).
      - ref: url.full
        requirement_level: opt_in
      - ref: http.request.method
        requirement_level: opt_in
      - ref: http.response.status_code
        requirement_level: opt_in
      - ref: server.address
        requirement_level: opt_in
      - ref: server.port
        requirement_level: opt_in
      - ref: network.protocol.version
        requirement_level: opt_in
      - ref: network.connection.type
        requirement_level: opt_in
      - ref: network.carrier.name
        requirement_level: opt_in
      - ref: exception.type
        requirement_level: opt_in
      - ref: http.request.body.size
        requirement_level: opt_in
      - ref: http.response.body.size
        requirement_level: opt_in

  - id: event.http.server.request.exception
    name: http.server.request.exception
    stability: development
    type: event
    brief: >
      This event represents an exception that occurred during HTTP server request processing,
      such as application errors, internal failures, or other exceptions that prevent
      the server from successfully handling the request.
    note: >
      This event SHOULD be recorded when an exception occurs during HTTP server request processing.

      Instrumentations SHOULD set the severity to ERROR (severity number 17) when recording this event.

      Instrumentations MAY provide a configuration option to populate exception events
      with the attributes captured on the corresponding HTTP server span.
    attributes:
      - ref: exception.type
        requirement_level:
          conditionally_required: Required if `exception.message` is not set, recommended otherwise.
      - ref: exception.message
        requirement_level:
          conditionally_required: Required if `exception.type` is not set, recommended otherwise.
      - ref: exception.stacktrace
