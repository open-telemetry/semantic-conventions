groups:
  - id: registry.openai
    deprecated:
      reason: uncategorized
      note: >
        Moved to the [OpenTelemetry GenAI semantic conventions repository](https://github.com/open-telemetry/semantic-conventions-genai).
    type: attribute_group
    display_name: OpenAI Attributes (Moved)
    brief: >
      OpenAI attributes have moved to the
      [OpenTelemetry GenAI semantic conventions repository](https://github.com/open-telemetry/semantic-conventions-genai).
    attributes:
      - id: openai.request.service_tier
        deprecated:
          reason: uncategorized
          note: >
            Moved to the [OpenTelemetry GenAI semantic conventions repository](https://github.com/open-telemetry/semantic-conventions-genai).
        annotations:
          dependency_resolution:
            exclude: true
        stability: development
        type:
          members:
            - id: auto
              value: "auto"
              brief: The system will utilize scale tier credits until they are exhausted.
              stability: development
            - id: default
              value: "default"
              brief: The system will utilize the default scale tier.
              stability: development
        brief: The service tier requested. May be a specific tier, default, or auto.
        examples: ['auto', 'default']
      - id: openai.api.type
        deprecated:
          reason: uncategorized
          note: >
            Moved to the [OpenTelemetry GenAI semantic conventions repository](https://github.com/open-telemetry/semantic-conventions-genai).
        annotations:
          dependency_resolution:
            exclude: true
        stability: development
        type:
          members:
            - id: chat_completions
              value: "chat_completions"
              brief: The OpenAI [Chat Completions API](https://developers.openai.com/api/reference/chat-completions/overview).
              stability: development
            - id: responses
              value: "responses"
              brief: The OpenAI [Responses API](https://developers.openai.com/api/reference/responses/overview).
              stability: development
        brief: The type of OpenAI API being used.
      - id: openai.response.service_tier
        deprecated:
          reason: uncategorized
          note: >
            Moved to the [OpenTelemetry GenAI semantic conventions repository](https://github.com/open-telemetry/semantic-conventions-genai).
        annotations:
          dependency_resolution:
            exclude: true
        stability: development
        type: string
        brief: The service tier used for the response.
        examples: ['scale', 'default']
      - id: openai.response.system_fingerprint
        deprecated:
          reason: uncategorized
          note: >
            Moved to the [OpenTelemetry GenAI semantic conventions repository](https://github.com/open-telemetry/semantic-conventions-genai).
        annotations:
          dependency_resolution:
            exclude: true
        stability: development
        type: string
        brief: A fingerprint to track any eventual change in the Generative AI environment.
        examples: ["fp_44709d6fcb"]
