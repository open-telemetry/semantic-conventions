groups:
  - id: registry.otel
    type: attribute_group
    display_name: OTel Attributes
    brief: Attributes reserved for OpenTelemetry
    attributes:
      - id: otel.status_code
        type:
          members:
            - id: ok
              value: OK
              brief: 'The operation has been validated by an Application developer or Operator to have completed successfully.'
              stability: stable
            - id: error
              value: ERROR
              brief: 'The operation contains an error.'
              stability: stable
        brief: Name of the code, either "OK" or "ERROR". MUST NOT be set if the status code is UNSET.
        stability: stable
      - id: otel.status_description
        type: string
        brief: "Description of the Status if it has a value, otherwise not set."
        examples: ['resource not found']
        stability: stable
      - id: otel.span.sampling_result
        type:
          members:
            - id: drop
              value: DROP
              brief: 'The span is not sampled and not recording'
              stability: development
            - id: record_only
              value: RECORD_ONLY
              brief: 'The span is not sampled, but recording'
              stability: development
            - id: record_and_sample
              value: RECORD_AND_SAMPLE
              brief: 'The span is sampled and recording'
              stability: development
        brief: "The result value of the sampler for this span"
        stability: development
      - id: otel.span.parent.origin
        type:
          members:
            - id: none
              value: none
              brief: 'The span does not have a parent, it is a root span'
              stability: development
            - id: local
              value: local
              brief: The span has a parent and the parent's span context [isRemote()](https://opentelemetry.io/docs/specs/otel/trace/api/#isremote) is false
              stability: development
            - id: remote
              value: remote
              brief: The span has a parent and the parent's span context [isRemote()](https://opentelemetry.io/docs/specs/otel/trace/api/#isremote) is true
              stability: development
        brief: "Determines whether the span has a parent span, and if so, [whether it is a remote parent](https://opentelemetry.io/docs/specs/otel/trace/api/#isremote)"
        stability: development
  - id: registry.otel.scope
    type: attribute_group
    display_name: OTel Scope Attributes
    brief: Attributes used by non-OTLP exporters to represent OpenTelemetry Scope's concepts.
    attributes:
      - id: otel.scope.name
        type: string
        brief: The name of the instrumentation scope - (`InstrumentationScope.Name` in OTLP).
        examples: ['io.opentelemetry.contrib.mongodb']
        stability: stable
      - id: otel.scope.version
        type: string
        brief: The version of the instrumentation scope - (`InstrumentationScope.Version` in OTLP).
        examples: ['1.0.0']
        stability: stable
      - id: otel.scope.schema_url
        type: string
        brief: The schema URL of the instrumentation scope.
        examples: ['https://opentelemetry.io/schemas/1.31.0']
        stability: development
  - id: registry.otel.event
    type: attribute_group
    display_name: OTel Event Attributes
    brief: Attributes used by non-OTLP exporters to represent OpenTelemetry Event's concepts.
    attributes:
      - id: otel.event.name
        type: string
        stability: stable
        brief: >
          Identifies the class / type of event.
        note: >
          This attribute SHOULD be used by non-OTLP exporters
          when destination does not support `EventName` or equivalent field.
          This attribute MAY be used by applications using existing logging
          libraries so that it can be used to set the `EventName` field by
          Collector or SDK components.
        examples: ["browser.mouse.click", "device.app.lifecycle"]
  - id: registry.otel.component
    type: attribute_group
    display_name: OTel Component Attributes
    brief: Attributes used for OpenTelemetry component self-monitoring
    attributes:
      - id: otel.component.type
        type:
          members:
            - id: batching_span_processor
              value: "batching_span_processor"
              brief: >
                The builtin SDK batching span processor
              stability: development
            - id: simple_span_processor
              value: "simple_span_processor"
              brief: >
                The builtin SDK simple span processor
              stability: development
            - id: batching_log_processor
              value: "batching_log_processor"
              brief: >
                The builtin SDK batching log record processor
              stability: development
            - id: simple_log_processor
              value: "simple_log_processor"
              brief: >
                The builtin SDK simple log record processor
              stability: development
            - id: otlp_grpc_span_exporter
              value: "otlp_grpc_span_exporter"
              brief: >
                OTLP span exporter over gRPC with protobuf serialization
              stability: development
            - id: otlp_http_span_exporter
              value: "otlp_http_span_exporter"
              brief: >
                OTLP span exporter over HTTP with protobuf serialization
              stability: development
            - id: otlp_http_json_span_exporter
              value: "otlp_http_json_span_exporter"
              brief: >
                OTLP span exporter over HTTP with JSON serialization
              stability: development
            - id: zipkin_http_span_exporter
              value: "zipkin_http_span_exporter"
              brief: >
                Zipkin span exporter over HTTP
              stability: development
            - id: otlp_grpc_log_exporter
              value: "otlp_grpc_log_exporter"
              brief: >
                OTLP log record exporter over gRPC with protobuf serialization
              stability: development
            - id: otlp_http_log_exporter
              value: "otlp_http_log_exporter"
              brief: >
                OTLP log record exporter over HTTP with protobuf serialization
              stability: development
            - id: otlp_http_json_log_exporter
              value: "otlp_http_json_log_exporter"
              brief: >
                OTLP log record exporter over HTTP with JSON serialization
              stability: development
            - id: periodic_metric_reader
              value: "periodic_metric_reader"
              brief: >
                The builtin SDK periodically exporting metric reader
              stability: development
            - id: otlp_grpc_metric_exporter
              value: "otlp_grpc_metric_exporter"
              brief: >
                OTLP metric exporter over gRPC with protobuf serialization
              stability: development
            - id: otlp_http_metric_exporter
              value: "otlp_http_metric_exporter"
              brief: >
                OTLP metric exporter over HTTP with protobuf serialization
              stability: development
            - id: otlp_http_json_metric_exporter
              value: "otlp_http_json_metric_exporter"
              brief: >
                OTLP metric exporter over HTTP with JSON serialization
              stability: development
            - id: prometheus_http_text_metric_exporter
              value: "prometheus_http_text_metric_exporter"
              brief: >
                Prometheus metric exporter over HTTP with the default text-based format
              stability: development
        stability: development
        brief: >
          A name identifying the type of the OpenTelemetry component.
        note: |
          If none of the standardized values apply, implementations SHOULD use the language-defined name of the type.
          E.g. for Java the fully qualified classname SHOULD be used in this case.
        examples: ["batching_span_processor", "com.example.MySpanExporter"]
      - id: otel.component.name
        type: string
        stability: development
        brief: >
          A name uniquely identifying the instance of the OpenTelemetry component within its containing SDK instance.
        note: |
          Implementations SHOULD ensure a low cardinality for this attribute, even across application or SDK restarts.
          E.g. implementations MUST NOT use UUIDs as values for this attribute.

          Implementations MAY achieve these goals by following a `<otel.component.type>/<instance-counter>` pattern, e.g. `batching_span_processor/0`.
          Hereby `otel.component.type` refers to the corresponding attribute value of the component.

          The value of `instance-counter` MAY be automatically assigned by the component and uniqueness within the enclosing SDK instance MUST be guaranteed.
          For example, `<instance-counter>` MAY be implemented by using a monotonically increasing counter (starting with `0`), which is incremented every time an
          instance of the given component type is started.

          With this implementation, for example the first Batching Span Processor would have `batching_span_processor/0`
          as `otel.component.name`, the second one `batching_span_processor/1` and so on.
          These values will therefore be reused in the case of an application restart.
        examples: ["otlp_grpc_span_exporter/0", "custom-name"]
      - id: otel.component.shutdown.result
        type:
          members:
            - id: success
              value: "success"
              brief: >
                The component shut down cleanly and drained any pending work.
              stability: development
            - id: failed
              value: "failed"
              brief: >
                The component shut down with one or more failures other than a timeout (e.g. an exporter rejected the final batch).
              stability: development
            - id: timed_out
              value: "timed_out"
              brief: >
                The component did not finish shutting down within the configured shutdown timeout.
              stability: development
        stability: development
        brief: >
          The result of an OpenTelemetry SDK component shutdown.
        examples: ["success", "failed", "timed_out"]
      - id: otel.component.dropped
        type: int
        stability: development
        brief: >
          The total number of telemetry items (spans, log records, metric data points, etc.) the OpenTelemetry SDK component dropped during normal operation over its lifetime.
        note: |
          Counts items dropped during normal operation for any reason, e.g. queue overflow or export failures that exhausted retries.
          The value is the cumulative count from the time the component was started until the moment the
          enclosing event (e.g. `otel.sdk.component.shutdown`) is emitted.

          Items that were buffered by the component when shutdown was initiated but could not be drained
          before shutdown terminated are reported separately via `otel.component.shutdown.dropped` and
          are NOT included in this lifetime counter.

          This attribute is only applicable to components that track a lifetime dropped count, such as
          queue-based processors (e.g. the Batching Span Processor or Batching Log Record Processor).
          Components that do not track this MUST omit the attribute. Consumers MUST treat absence as
          "unknown / not applicable", not as `0`.
        examples: [0, 42]
      - id: otel.component.shutdown.dropped
        type: int
        stability: development
        brief: >
          The number of telemetry items that were buffered by the component when shutdown was initiated but could not be confirmed delivered before shutdown terminated.
        note: |
          Reported on `otel.sdk.component.shutdown` events. Captures items that the component
          had accepted prior to shutdown but could not confirm delivered by the time the
          shutdown attempt was abandoned (typically because the configured shutdown timeout
          elapsed, or the final export attempt failed).

          When `otel.component.shutdown.result` is `success`, this attribute MUST be `0`: a
          successful shutdown means the drain completed and nothing was left unconfirmed.
          Non-zero values therefore only occur when `otel.component.shutdown.result` is
          `failed` or `timed_out`.

          The reported value is an **upper bound** on actual data loss, not a precise count.
          The SDK counts items it could not confirm delivered at the moment the shutdown
          attempt was abandoned. In particular, in-flight export requests that the SDK had to
          abandon (e.g. at timeout) MAY still complete successfully on the wire after the SDK
          gave up; their items are nevertheless counted here because the SDK cannot confirm
          delivery. Implementations SHOULD count:

          - items still in the component's buffer that were never handed to an exporter,
          - items handed to an exporter in a request that the SDK abandoned without a
            confirmed response, and
          - items rejected by the final export attempt (e.g. OTLP partial-success rejections).

          This attribute is only applicable to components that buffer items (e.g. the Batching
          Span Processor or Batching Log Record Processor). Non-buffering components MUST omit
          the attribute. Consumers MUST treat absence as "unknown / not applicable", not as `0`.
        examples: [0, 800]
