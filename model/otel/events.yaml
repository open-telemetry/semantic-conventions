groups:
  - id: event.otel.sdk.component.shutdown
    type: event
    name: otel.sdk.component.shutdown
    stability: development
    brief: >
      Indicates that an OpenTelemetry SDK component's shutdown attempt has ended,
      whether by completing successfully, failing, or being abandoned (e.g. on timeout).
    note: |
      **Applicability.**

      SDK implementations SHOULD emit an `otel.sdk.component.shutdown` event for each
      SDK component instance that has an explicit `Shutdown` operation and that owns
      telemetry processing, buffering, reading, or exporting state.
      This includes span processors, log record processors, metric readers, span
      exporters, log record exporters, and metric exporters, as well as custom
      implementations of any of these categories. See the well-known values of
      [`otel.component.type`](/docs/registry/attributes/otel.md) for the full list of
      built-in types.

      Providers (e.g. `TracerProvider`, `LoggerProvider`, `MeterProvider`) are not
      expected to emit this event. A provider's shutdown is already covered by the
      events emitted by its child components, and a higher-level provider event would
      carry no information beyond what those child events already convey. A future
      revision of this convention may define provider-level shutdown events if a need
      emerges.

      **Emission rules.**

      An OpenTelemetry SDK component is shut down at most once. The event SHOULD be
      emitted exactly once per component instance, reporting the result of that one
      shutdown. Subsequent invocations of the shutdown API on a component that is
      already shut down MUST NOT emit additional events.

      If the process terminates without invoking the component's shutdown operation
      (e.g. a crash, `SIGKILL`, container eviction, or immediate process termination),
      no event is expected. Consumers MUST NOT interpret the absence of this event as
      evidence of a clean shutdown.

      The event timestamp SHOULD reflect the time at which the shutdown attempt ended
      (whether by completing, failing, or being abandoned). Combined with
      `otel.component.shutdown.duration`, the start of the shutdown attempt can be
      reconstructed as `timestamp - duration`. The event body SHOULD be omitted; all
      event data defined by this convention is conveyed through attributes.

      **Severity.**

      Implementations SHOULD set the log record severity to `WARN`
      (`SeverityNumber` = `13`) when `otel.component.shutdown.result` is not
      `success`, and to `INFO` (`SeverityNumber` = `9`) otherwise.

      `otel.component.dropped` (the lifetime counter) does not affect severity: it is
      reported on this event as a diagnostic snapshot, but lifetime drops are the
      domain of per-operation SDK metrics (e.g. `otel.sdk.processor.*.processed` with
      `error.type`) and should be alerted on there. Operators who specifically want a
      "lost-any-data-ever" signal from this event alone can query for
      `otel.component.dropped > 0` directly.

      **Relationship with existing SDK metrics.**

      The drop counts on this event are a terminal summary emitted at shutdown, when
      the metrics pipeline itself may no longer be reliable. These counts MAY overlap
      with per-operation SDK metrics (e.g. `otel.sdk.processor.*.processed` or
      `otel.sdk.exporter.*.exported`, both with `error.type`) and SHOULD NOT be
      combined with those metrics to compute aggregate loss.

      The reason a shutdown failed is intentionally not classified on this event
      (there is no `error.type` attribute). Failure-cause classification is the
      responsibility of the operation-level signals (e.g. `otel.sdk.exporter.*.exported`
      with `error.type`) emitted while the SDK is still healthy.
    attributes:
      - ref: otel.component.type
        requirement_level: required
      - ref: otel.component.name
        requirement_level: required
      - ref: otel.component.shutdown.result
        requirement_level: required
      - ref: otel.component.dropped
        requirement_level:
          recommended: >
            If the component tracks a lifetime dropped count (e.g. queue-based
            processors such as the Batching Span Processor or Batching Log Record
            Processor). Components that do not track this MUST omit the attribute;
            consumers MUST treat absence as "unknown / not applicable", not as `0`.
        brief: >
          The total number of items the component dropped during normal operation over
          its lifetime, excluding items abandoned during the shutdown attempt itself
          (see `otel.component.shutdown.dropped`).
      - ref: otel.component.shutdown.dropped
        requirement_level:
          recommended: >
            If the component owns queued, buffered, retry, or in-flight telemetry items
            at the time shutdown is initiated (e.g. queue-based processors such as the
            Batching Span Processor, or an exporter with an in-flight export request).
            Components that do not own such items MUST omit the attribute; consumers
            MUST treat absence as "unknown / not applicable", not as `0`.
        brief: >
          The number of telemetry items the component could not confirm delivered before
          the shutdown attempt ended. MUST be `0` when `otel.component.shutdown.result`
          is `success`; non-zero values are an upper bound on actual loss (in-flight
          export requests abandoned at timeout may still succeed on the wire).
      - ref: otel.component.shutdown.duration
        requirement_level: recommended
        brief: >
          The wall-clock elapsed time of the shutdown attempt, in seconds. Combined with
          the event timestamp, this lets consumers compute when the shutdown attempt
          started.
