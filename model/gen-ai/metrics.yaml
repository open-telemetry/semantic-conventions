groups:
  - id: metric_attributes.gen_ai
    type: attribute_group
    brief: 'This group describes GenAI metrics attributes'
    attributes:
      - ref: server.address
        brief: GenAI server address.
        requirement_level: recommended
      - ref: server.port
        brief: GenAI server port.
        requirement_level:
          conditionally_required: If `server.address` is set.
      - ref: gen_ai.response.model
        requirement_level: recommended
      - ref: gen_ai.request.model
        requirement_level:
          conditionally_required: If available.
      - ref: gen_ai.provider.name
        requirement_level: required
      - ref: gen_ai.operation.name
        requirement_level: required
  - id: metric_attributes.gen_ai.server
    type: attribute_group
    brief: 'This group describes GenAI server metrics attributes'
    extends: metric_attributes.gen_ai
    attributes:
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
        note: |
          The `error.type` SHOULD match the error code returned by the Generative AI service,
          the canonical name of exception that occurred, or another low-cardinality error identifier.
          Instrumentations SHOULD document the list of errors they report.
  - id: metric_attributes.openai
    type: attribute_group
    brief: 'This group describes GenAI server metrics attributes'
    attributes:
      - ref: openai.response.service_tier
        requirement_level: recommended
      - ref: openai.response.system_fingerprint
        requirement_level: recommended
  - id: metric.gen_ai.client.token.usage
    type: metric
    metric_name: gen_ai.client.token.usage
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of input and output tokens used.'
    note: |
      When the provider reports a detailed token breakdown, instrumentations
      SHOULD partition the token count across the relevant attribute values
      instead of emitting a separate total. The partitioned data points MUST
      sum to the total token count for that token type, and a bare data point
      with only `gen_ai.token.type` set MUST NOT be emitted alongside them.

      When no breakdown is available, a single data point with only
      `gen_ai.token.type` set SHOULD be recorded.

      For example, a response with 100 input tokens (50 cache-read, 50 uncached)
      and 200 output tokens (150 reasoning, 50 non-reasoning) SHOULD produce:

      - `gen_ai.client.token.usage{gen_ai.token.type="input", gen_ai.token.cache="read"}` = 50
      - `gen_ai.client.token.usage{gen_ai.token.type="input", gen_ai.token.cache="uncached"}` = 50
      - `gen_ai.client.token.usage{gen_ai.token.type="output", gen_ai.token.reasoning=true}` = 150
      - `gen_ai.client.token.usage{gen_ai.token.type="output", gen_ai.token.reasoning=false}` = 50
    instrument: histogram
    unit: "{token}"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.token.type
        requirement_level: required
      - ref: gen_ai.token.cache
        requirement_level:
          conditionally_required: when the provider reports a cache breakdown for input tokens.
      - ref: gen_ai.token.reasoning
        requirement_level:
          conditionally_required: when the provider reports reasoning token usage for output tokens.
  - id: metric.gen_ai.client.operation.duration
    type: metric
    metric_name: gen_ai.client.operation.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI operation duration.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
        note: |
          The `error.type` SHOULD match the error code returned by the Generative AI provider or the client library,
          the canonical name of exception that occurred, or another low-cardinality error identifier.
          Instrumentations SHOULD document the list of errors they report.
  - id: metric.gen_ai.client.operation.time_to_first_chunk
    type: metric
    metric_name: gen_ai.client.operation.time_to_first_chunk
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Time to receive the first chunk, measured from when the client issues the generation request to when the first chunk is received in the response stream.'
    note: >
      This metrics SHOULD be reported for streaming calls and SHOULD NOT be reported otherwise.
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
  - id: metric.gen_ai.client.operation.time_per_output_chunk
    type: metric
    metric_name: gen_ai.client.operation.time_per_output_chunk
    annotations:
      code_generation:
        metric_value_type: double
    brief: >
      Time per output chunk, recorded for each chunk received after the first one, measured as the time elapsed from the end of the previous chunk to the end of the current chunk.
    note: >
      This metrics SHOULD be reported for streaming calls and SHOULD NOT be reported otherwise.
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
  - id: metric.gen_ai.server.request.duration
    type: metric
    metric_name: gen_ai.server.request.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Generative AI server request duration such as time-to-last byte or last output token.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai.server
  - id: metric.gen_ai.server.time_per_output_token
    type: metric
    metric_name: gen_ai.server.time_per_output_token
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Time per output token generated after the first token for successful responses.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
  - id: metric.gen_ai.server.time_to_first_token
    type: metric
    metric_name: gen_ai.server.time_to_first_token
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Time to generate first token for successful responses.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
