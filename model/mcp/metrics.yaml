groups:
  - id: mcp.request.metrics.attributes
    type: attribute_group
    brief: MCP request metrics attributes
    extends: mcp.common.attributes
    attributes:
      - ref: mcp.resource.uri
        requirement_level: opt_in

  - id: mcp.session.metrics.attributes
    type: attribute_group
    brief: MCP session metrics attributes
    attributes:
      - ref: network.transport
      - ref: server.address
      - ref: server.port
        requirement_level:
          conditionally_required: When `server.address` is set
      - ref: error.type
        requirement_level:
          conditionally_required: If and only if session ends with an error.

  - id: metric.mcp.client.request.duration
    type: metric
    metric_name: mcp.client.request.duration
    brief: The duration of the MCP request or notification as observed on the sender.
    unit: s
    instrument: histogram
    stability: development
    extends: mcp.request.metrics.attributes

  - id: metric.mcp.server.request.duration
    type: metric
    metric_name: mcp.server.request.duration
    brief: MCP request or notification duration as observed on the receiver.
    unit: s
    instrument: histogram
    stability: development
    extends: mcp.request.metrics.attributes

  - id: metric.mcp.client.session.duration
    type: metric
    metric_name: mcp.client.session.duration
    brief: The duration of the MCP session as observed on the MCP client.
    unit: s
    instrument: histogram
    stability: development
    extends: mcp.session.metrics.attributes

  - id: metric.mcp.server.session.duration
    type: metric
    metric_name: mcp.server.session.duration
    brief: The duration of the MCP session as observed on the MCP server.
    unit: s
    instrument: histogram
    stability: development
    extends: mcp.session.metrics.attributes
