groups:
  - id: metric.network.flow.bytes
    type: metric
    metric_name: network.flow.bytes
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: Bytes transferred from a source endpoint to a destination endpoint.
    note: |
      This metric describes point-to-point network traffic: the number of bytes being transmitted from the
      network source (or grouped sources) to a network destination (or group of destinations).
    instrument: counter
    unit: "By"
    attributes:
      - ref: host.ip
        note: |
          This value belongs to the IP of the node where the network observability agent runs. It allows
          deduplicating information of the same flow when source and destination are in different nodes
          and thus they are observed by agents both in the source and destination nodes.
        requirement_level: recommended
      - ref: network.flow.direction
        requirement_level: opt_in
      - ref: network.transport
        requirement_level: opt_in
      - ref: network.interface.name
        requirement_level: opt_in
      - ref: source.address
        requirement_level: opt_in
      - ref: destination.address
        requirement_level: opt_in
      - ref: source.port
        requirement_level: opt_in
      - ref: destination.port
        requirement_level:
          recommended: when the same host runs multiple service instances. For differentiation
      - ref: source.cidr
        requirement_level:
          recommended: when the source address is classified into configured CIDR ranges and there is no other low-cardinality attribute to define the network flow destination.
      - ref: destination.cidr
        requirement_level:
          recommended: when the source address is classified into configured CIDR ranges and there is no other low-cardinality attribute to define the network flow destination.
      - ref: source.name
        requirement_level: opt_in
      - ref: destination.name
        requirement_level: opt_in
      - ref: source.cloud.availability_zone
        requirement_level:
          opt_in: when source-side cloud zone information is available.
      - ref: destination.cloud.availability_zone
        requirement_level:
          opt_in: when destination-side cloud zone information is available.
      - ref: k8s.cluster.name
        requirement_level:
          recommended: when the flow is observed in Kubernetes.
      - ref: source.k8s.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.k8s.namespace.name
        requirement_level:
          recommended: when the flow is observed in Kubernetes.
      - ref: destination.k8s.namespace.name
        requirement_level:
          recommended: when the flow is observed in Kubernetes.
      - ref: source.k8s.pod.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.pod.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.k8s.resource.type
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.resource.type
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.k8s.owner.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.owner.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.k8s.owner.type
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.owner.type
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.k8s.node.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.node.name
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.k8s.node.ip
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: destination.k8s.node.ip
        requirement_level:
          opt_in: when the flow is observed in Kubernetes.
      - ref: source.country
        requirement_level:
          opt_in: when Geo IP data is observed for the source address.
      - ref: destination.country
        requirement_level:
          opt_in: when Geo IP data is observed for the destination address.
      - ref: source.asn
        requirement_level:
          opt_in: when Geo IP data is observed for the source address.
      - ref: destination.asn
        requirement_level:
          opt_in: when Geo IP data is observed for the destination address.


  - id: metric.network.inter.zone.bytes
    type: metric
    metric_name: network.inter.zone.bytes
    annotations:
      code_generation:
        metric_value_type: int
    stability: development
    brief: Bytes transferred between source and destination cloud availability zones.
    note: |
      This metric is intended for reduced-cardinality reporting of inter-zone traffic.
      It can be emitted alongside `network.flow.bytes` without requiring zone attributes on every flow datapoint.
