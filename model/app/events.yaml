groups:
  - id: event.app.crash
    stability: development
    type: event
    name: app.crash
    brief: |
      This event represents a termination of a user-facing application due to
      unrecoverable programming errors such as exceptions or signals that
      indicate an error has happened at a lower level.
    note: |
      This event identifies the crash of an end-user facing app, a specific type
      of unexpected app termination defined in the `brief` section. It is intended
      to provide a basic schema that can be used for all crashes, but it existence
      does not preclude other, more narrow events to be defined with more extensive
      schemas to handle specific crash scenarios on specific platforms.
      Crash events can be produced asynchronously, so it can contain attributes
      that are normally provided by the SDK Resource. See the definition of
      `app.async` for more details about how to use them as it pertains to crashes.
      How the instrumentation will determine whether an instance of a crash has
      already been reported and how the necessary data will be retrieved is left up
      to the instrumentation. Providing enough data to dedupe is NOT REQUIRED.
      If `exception` attributes are used, it indicates that the exception represented
      by those attributes caused the crash. When used, these attributes SHOULD be
      usable for debugging without additional data not specified in the event
      (e.g. stacktrace already deobfuscated). If that is not the case, additional
      information like `app.build_id` SHOULD be provided to make the data useful for
      debugging, either as an attribute in this event or derived from the Resource if
      `app.sync` is not true.
    attributes:
      - ref: app.async
        requirement_level: opt_in
      - ref: app.build_id
        requirement_level:
          conditionally_required: Recommended if `app.async` is set, opt_in otherwise.
      - ref: app.crash.id
        requirement_level: opt_in
      - ref: exception.type
        requirement_level: opt_in
      - ref: exception.message
        requirement_level: opt_in
      - ref: exception.stacktrace
        requirement_level: opt_in
      - ref: os.name
        requirement_level:
          conditionally_required: Recommended if `app.async` is set, opt_in otherwise.
      - ref: os.version
        requirement_level:
          conditionally_required: Recommended if `app.async` is set, opt_in otherwise.
      - ref: service.name
        requirement_level:
          conditionally_required: Recommended if `app.async` is set, opt_in otherwise.
      - ref: service.version
        requirement_level:
          conditionally_required: Recommended if `app.async` is set, opt_in otherwise.
      - ref: session.id
        requirement_level: recommended
  - id: event.app.screen.click
    stability: development
    type: event
    name: app.screen.click
    brief: >
      This event represents an instantaneous click on the screen of an application.
    note: >
      The `app.screen.click` event can be used to indicate that a user has
      clicked or tapped on the screen portion of an application. Clicks
      outside of an application's active area SHOULD NOT generate this event.
      This event does not differentiate between touch/mouse down and
      touch/mouse up. Implementations SHOULD give preference to generating
      this event at the time the click is complete, typically on touch
      release or mouse up. The location of the click event MUST be provided
      in absolute screen pixels.
    attributes:
      - ref: app.screen.coordinate.x
        requirement_level: required
      - ref: app.screen.coordinate.y
        requirement_level: required
      - ref: app.screen.id
        requirement_level: recommended
      - ref: app.screen.name
        requirement_level: opt_in
  - id: event.app.widget.click
    stability: development
    type: event
    name: app.widget.click
    brief: >
      This event indicates that an application widget has been clicked.
    note: >
      Use this event to indicate that visual application component has been
      clicked, typically through a user's manual interaction.
    attributes:
      - ref: app.widget.id
        requirement_level: required
      - ref: app.widget.name
        requirement_level: opt_in
      - ref: app.screen.coordinate.x
        requirement_level: opt_in
      - ref: app.screen.coordinate.y
        requirement_level: opt_in
      - ref: app.screen.id
        requirement_level: recommended
      - ref: app.screen.name
        requirement_level: opt_in
  - id: event.app.jank
    stability: development
    type: event
    name: app.jank
    brief: >
      This event indicates that the application has detected substandard UI
      rendering performance.
    note: >
      Jank happens when the UI is rendered slowly enough for the user to
      experience some disruption or sluggishness.
    attributes:
      - ref: app.jank.frame_count
        requirement_level: recommended
      - ref: app.jank.threshold
        requirement_level: recommended
      - ref: app.jank.period
        requirement_level: recommended
