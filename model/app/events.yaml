groups:
  - id: event.app.crash
    stability: development
    type: event
    name: app.crash
    brief: |
      This event represents a termination of a user-facing application due to
      unrecoverable programming errors such as exceptions or signals that
      indicate an error has happened at a lower level.
    note: |
      Crash events can be produced asynchronously by an OTel SDK instance that is
      not running in the application instance in which the crash happened. For
      example, the instrumentation may report crashes from previous app instances
      based on information found in tombstones on disk.
      If the reporter of the crash is not the crashing application instance itself,
      relevant resource attributes that identify the application instance that
      crashed MUST be provided as event attributes so that the corresponding
      attributes from the reporter's resource aren't used instead.
      How the instrumentation will determine whether an instance of a crash has
      already been reported and how the necessary data will be retrieved is left up
      to the instrumentation. Providing enough data to dedupe is NOT REQUIRED.
    attributes:
      - ref: app.build_id
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself and it's available.
      - ref: app.crash.id
        requirement_level: recommended
      - ref: exception.type
        requirement_level: recommended
        note: If this contains obfuscated symbols, `app.build_id` SHOULD be provided so they can be deobfuscated.
      - ref: exception.message
        requirement_level: recommended
        note: If this contains obfuscated symbols, `app.build_id` SHOULD be provided so they can be deobfuscated.
      - ref: exception.stacktrace
        requirement_level: recommended
        note: If this contains obfuscated symbols, `app.build_id` SHOULD be provided so they can be deobfuscated.
      - ref: os.name
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself and the OS name is available.
      - ref: os.version
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself.
      - ref: service.version
        requirement_level:
          conditionally_required: If reporter is not the crashing application instance itself.
      - ref: session.id
        requirement_level: recommended
  - id: event.app.screen.click
    stability: development
    type: event
    name: app.screen.click
    brief: >
      This event represents an instantaneous click on the screen of an application.
    note: >
      The `app.screen.click` event can be used to indicate that a user has
      clicked or tapped on the screen portion of an application. Clicks
      outside of an application's active area SHOULD NOT generate this event.
      This event does not differentiate between touch/mouse down and
      touch/mouse up. Implementations SHOULD give preference to generating
      this event at the time the click is complete, typically on touch
      release or mouse up. The location of the click event MUST be provided
      in absolute screen pixels.
    attributes:
      - ref: app.screen.coordinate.x
        requirement_level: required
      - ref: app.screen.coordinate.y
        requirement_level: required
      - ref: app.screen.id
        requirement_level: recommended
      - ref: app.screen.name
        requirement_level: opt_in
  - id: event.app.widget.click
    stability: development
    type: event
    name: app.widget.click
    brief: >
      This event indicates that an application widget has been clicked.
    note: >
      Use this event to indicate that visual application component has been
      clicked, typically through a user's manual interaction.
    attributes:
      - ref: app.widget.id
        requirement_level: required
      - ref: app.widget.name
        requirement_level: opt_in
      - ref: app.screen.coordinate.x
        requirement_level: opt_in
      - ref: app.screen.coordinate.y
        requirement_level: opt_in
      - ref: app.screen.id
        requirement_level: recommended
      - ref: app.screen.name
        requirement_level: opt_in
  - id: event.app.jank
    stability: development
    type: event
    name: app.jank
    brief: >
      This event indicates that the application has detected substandard UI
      rendering performance.
    note: >
      Jank happens when the UI is rendered slowly enough for the user to
      experience some disruption or sluggishness.
    attributes:
      - ref: app.jank.frame_count
        requirement_level: recommended
      - ref: app.jank.threshold
        requirement_level: recommended
      - ref: app.jank.period
        requirement_level: recommended
