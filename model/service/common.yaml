groups:
  - id: remote.service
    type: attribute_group
    brief: "Operations that access some remote service MAY use these attributes to describe the remote service."
    attributes:
      - ref: server.service.name
        requirement_level: opt_in
      - ref: server.service.namespace
        requirement_level: opt_in
      - ref: client.service.name
        requirement_level: opt_in
      - ref: client.service.namespace
        requirement_level: opt_in
