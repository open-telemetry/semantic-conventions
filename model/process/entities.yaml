groups:
  - id: entity.process
    type: entity
    stability: release_candidate
    name: process
    brief: >
        An operating system process.
    attributes:
      - ref: process.pid
        role: identifying
        requirement_level: required
      - ref: process.parent_pid
        role: descriptive
        requirement_level: opt_in
      - ref: process.command
        role: descriptive
        requirement_level: recommended
      - ref: process.command_line
        role: descriptive
        requirement_level: opt_in
      - ref: process.command_args
        role: descriptive
        requirement_level: opt_in
      - ref: process.args_count
        role: descriptive
        requirement_level: opt_in
      - ref: process.creation.time
        role: identifying
        requirement_level: required
      - ref: process.interactive
        role: descriptive
        requirement_level: opt_in
      - ref: process.title
        role: descriptive
        requirement_level: opt_in
      - ref: process.working_directory
        role: descriptive
        requirement_level: opt_in
      - ref: process.owner
        role: descriptive
        requirement_level: recommended
      - ref: process.linux.cgroup
        role: descriptive
        requirement_level: opt_in

  - id: entity.process.runtime
    type: entity
    stability: development
    name: process.runtime
    brief: >
      The single (language) runtime instance which is monitored.
    note: >
      This entity (resource attributes) should not be reported when the process is being
      externally observed as the runtime details will not be readily available.
      In the externally observed scenario, the `process.executable` entity may be used to describe the runtime.
    attributes:
      - ref: process.runtime.name
        role: identifying
      - ref: process.runtime.version
        role: identifying
      - ref: process.runtime.description
        role: descriptive

  - id: entity.process.executable
    type: entity
    stability: development
    name: process.executable
    brief: >
      The executable running within a process and is designed to be common across processes.
    note: >
      This entity (resource attributes) is used to represent an executable
      which has been deployed to a system and the execution of that executable
      via a process is resulting in the production of the telemetry.
      This entity (resource attributes) should not be used to describe the runtime executable unless,
      the process is being externally observed as that results in the runtime details not being readily available.
    attributes:
      - ref: process.executable.build_id.htlhash
        role: identifying
        requirement_level: required
      - ref: process.executable.path
        role: descriptive
        requirement_level: opt_in
      - ref: process.executable.build_id.go
        role: descriptive
        requirement_level: opt_in
      - ref: process.executable.build_id.gnu
        role: descriptive
        requirement_level: opt_in
      - ref: process.executable.name
        role: descriptive
        requirement_level: recommended
