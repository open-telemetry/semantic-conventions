groups:
  - id: registry.source
    type: attribute_group
    display_name: Source Attributes
    brief: >
      These attributes may be used to describe the sender of a network exchange/packet. These should be used
      when there is no client/server relationship between the two sides, or when that relationship is unknown.
      This covers low-level network interactions (e.g. packet tracing) where you don't know if
      there was a connection or which side initiated it.
      This also covers unidirectional UDP flows and peer-to-peer communication where the
      "user-facing" surface of the protocol / API doesn't expose a clear notion of client and server.
    attributes:
      - id: source.address
        type: string
        stability: development
        brief: "Source address - domain name if available without reverse DNS lookup; otherwise, IP address or Unix domain socket name."
        note: >
          When observed from the destination side, and when communicating through an intermediary, `source.address` SHOULD represent
          the source address behind any intermediaries, for example proxies, if it's available.
        examples: ['source.example.com', '10.1.2.80', '/tmp/my.sock']
      - id: source.port
        type: int
        stability: development
        brief: 'Source port number'
        examples: [3389, 2888]
      # Attributes describing the source endpoint of a network flow.
      # See the network flow convention in docs/network/network-flow.md.
      - id: source.cidr
        type: string
        stability: development
        brief: The CIDR range that matched the source address.
        note: |-
          The instrumentation can associate addresses with CIDR ranges.
          This value can be derived from the host network configuration,
          or can match a user-defined value that is provided to the
          instrumentation.
        examples: ["10.0.0.0/8"]
      - id: source.cloud.region
        type: string
        stability: development
        brief: The cloud region associated with the source side of the flow.
        note: Mirrors [`cloud.region`](/docs/registry/attributes/cloud.md) for the source endpoint of the flow.
        examples: ["us-east-1"]
      - id: source.cloud.availability_zone
        type: string
        stability: development
        brief: The cloud availability zone associated with the source side of the flow.
        note: Mirrors [`cloud.availability_zone`](/docs/registry/attributes/cloud.md) for the source endpoint of the flow.
        examples: ["us-east-1c"]
      - id: source.k8s.namespace.name
        type: string
        stability: development
        brief: The name of the Kubernetes namespace associated with the source side of the flow.
        examples: ["frontend"]
      - id: source.k8s.pod.name
        type: string
        stability: development
        brief: The name of the Kubernetes Pod associated with the source side of the flow.
        examples: ["frontend-7c9d4b6d7f-9kz2m"]
      - id: source.k8s.resource.type
        type: string
        stability: development
        brief: The Kubernetes resource type associated with the source side of the flow.
        examples: ["Node", "Pod"]
      - id: source.k8s.owner.name
        type: string
        stability: development
        brief: The name of the Kubernetes workload owner associated with the source side of the flow.
        examples: ["frontend"]
      - id: source.k8s.owner.type
        type: string
        stability: development
        brief: The Kubernetes workload owner type associated with the source side of the flow.
        examples: ["Deployment", "Daemonset"]
      - id: source.k8s.node.name
        type: string
        stability: development
        brief: The name of the Kubernetes node associated with the source side of the flow.
        examples: ["ip-10-0-12-34.ec2.internal"]
      - id: source.k8s.node.ip
        type: string
        stability: development
        brief: The IP address of the Kubernetes node associated with the source side of the flow.
        examples: ["10.0.12.34"]
