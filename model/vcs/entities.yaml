groups:
  - id: entity.vcs.repository
    type: entity
    stability: release_candidate
    name: vcs.repository
    brief: >
        A repository in the Version Control System.
    attributes:
      - ref: vcs.repository.url.full
        role: identifying
        requirement_level: required
      - ref: vcs.repository.name
        role: descriptive

  - id: entity.vcs.ref
    type: entity
    stability: development
    name: vcs.ref
    brief: >
        A reference to a specific version in the Version Control System.
    attributes:
      - ref: vcs.ref.head.name
        role: descriptive
      - ref: vcs.ref.head.revision
        role: identifying
        requirement_level: required
      - ref: vcs.ref.type
        role: descriptive
