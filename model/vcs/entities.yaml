groups:
  - id: entity.vcs.repo
    type: entity
    stability: release_candidate
    name: vcs.repo
    brief: >
        A repository in the Version Control System.
    attributes:
      - ref: vcs.repository.url.full
        role: identifying
      - ref: vcs.repository.name
        role: descriptive

  - id: entity.vcs.ref
    type: entity
    stability: release_candidate
    name: vcs.ref
    brief: >
        A reference to a specific version in the Version Control System.
    attributes:
      - ref: vcs.ref.head.name
        role: descriptive
      - ref: vcs.ref.head.revision
        role: identifying
      - ref: vcs.ref.type
        role: descriptive
