groups:
  - id: registry.hardware
    type: attribute_group
    display_name: Hardware Attributes
    brief: >
      Hardware attributes are used to represent details about the hw components which are providing the base platform for the software running to be emitting telemetry.
      It is important to correctly describe the component by indicating the `hw.type`.
    attributes:
      - id: hw.id
        type: string
        stability: development
        brief: >
          An identifier for the hardware component, unique within the monitored host
        examples: ['win32battery_battery_testsysa33_1']
      - id: hw.name
        type: string
        stability: development
        brief: >
          An easily-recognizable name for the hardware component
        examples: ['eth0']
      - id: hw.parent
        type: string
        stability: development
        brief: >
          Unique identifier of the parent component (typically the `hw.id` attribute of the enclosure, or disk controller)
        examples: ['dellStorage_perc_0']
      - id: hw.type
        type:
          members:
            - id: battery
              value: 'battery'
              brief: "Battery"
              stability: development
            - id: cpu
              value: 'cpu'
              brief: 'CPU'
              stability: development
            - id: disk_controller
              value: 'disk_controller'
              brief: 'Disk controller'
              stability: development
            - id: enclosure
              value: 'enclosure'
              brief: 'Enclosure'
              stability: development
            - id: fan
              value: 'fan'
              brief: 'Fan'
              stability: development
            - id: gpu
              value: 'gpu'
              brief: 'GPU'
              stability: development
            - id: logical_disk
              value: 'logical_disk'
              brief: 'Logical disk'
              stability: development
            - id: memory
              value: 'memory'
              brief: 'Memory'
              stability: development
            - id: network
              value: 'network'
              brief: 'Network'
              stability: development
            - id: physical_disk
              value: 'physical_disk'
              brief: 'Physical disk'
              stability: development
            - id: power_supply
              value: 'power_supply'
              brief: 'Power supply'
              stability: development
            - id: tape_drive
              value: 'tape_drive'
              brief: 'Tape drive'
              stability: development
            - id: temperature
              value: 'temperature'
              brief: 'Temperature'
              stability: development
            - id: voltage
              value: 'voltage'
              brief: 'Voltage'
              stability: development
        stability: development
        brief: >
          Type of the component
        note: >
          Describes the category of the hardware component for which `hw.state` is being reported. For example,
          `hw.type=temperature` along with `hw.state=degraded` would indicate that the temperature of the hardware
          component has been reported as `degraded`.
      - id: hw.state
        type:
          members:
            - id: ok
              value: 'ok'
              brief: "Ok"
              stability: development
            - id: degraded
              value: 'degraded'
              brief: 'Degraded'
              stability: development
            - id: failed
              value: 'failed'
              brief: 'Failed'
              stability: development
        stability: development
        brief: >
          The current state of the component
      - id: hw.vendor.id
        type: string
        stability: development
        brief: >
          A fixed id which identifies the vendor.
        note: >
          if the hardware component doesn't provide it, it should default to the name.
        examples: ['GenuineIntel', 'Seagate', 'Western Digital']
      - id: hw.vendor.name
        type: string
        stability: development
        brief: >
          Vendor name
        examples: ['Intel', 'Seagate', 'Western Digital']
      - id: hw.model.id
        type: string
        stability: development
        brief: >
          A fixed id which identifies the model.
        note: >
          If not known should default to the name
        examples: ['Barracuda 7200', '9000/778/B180L']
      - id: hw.model.name
        type: string
        stability: development
        brief: >
          Descriptive model name
        examples: ['Barracuda 7200', 'Intel(R) Core(TM) i7 CPU         930  @ 2.80GHz']
      - id: hw.model.family
        type: string
        stability: development
        brief: >
          Family or generation of the CPU.
        examples: ['PA-RISC 1.1e', 'Intel64 Family 6 Model 26 Stepping 5']
      - id: hw.serial_number
        type: string
        stability: development
        brief: >
          Serial number
        examples: ['SGHDD001ABC']
