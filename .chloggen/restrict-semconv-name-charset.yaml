# Use this changelog template to create an entry for release notes.
#
# If your change doesn't affect end users you should instead start
# your pull request title with [chore] or use the "Skip Changelog" label.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the area of concern in the attributes-registry, (e.g. http, cloud, db)
component: naming

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: |
  Make explicit the character set used by Semantic Convention metric names:
  metric instrument names defined by Semantic Conventions MUST match
  `[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*`. This restriction applies only to
  metric names defined by Semantic Conventions; user-defined metric names
  follow the broader rules of the OpenTelemetry Metrics API.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
# The values here must be integers.
issues: []

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  This is a normative codification of the existing convention — every
  Semantic Convention name today already matches this pattern.
