# Use this changelog template to create an entry for release notes.
#
# If your change doesn't affect end users you should instead start
# your pull request title with [chore] or use the "Skip Changelog" label.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the area of concern in the attributes-registry, (e.g. http, cloud, db)
component: gen-ai

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Split `invoke_agent` span attributes from inference attribute hierarchy.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
# The values here must be integers.
issues: [2632]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  The `invoke_agent` span now extends a dedicated `attributes.gen_ai.invoke_agent.client`
  attribute group instead of `attributes.gen_ai.inference.client`. This removes
  `gen_ai.response.id`, `gen_ai.response.model`, and `gen_ai.response.finish_reasons`
  from `invoke_agent` spans and adds notes clarifying that usage token attributes
  represent aggregated totals when the agent performs multiple GenAI requests internally.
